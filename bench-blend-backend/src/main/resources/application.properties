# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/bench_blend
spring.datasource.username=benchblend_admin
spring.datasource.password=benchblend2003

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=benchblend-super-secret-jwt-key-2003-modern-college-pune
app.jwt.expiration-ms=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# App
app.name=BenchBlend
app.version=1.0.0